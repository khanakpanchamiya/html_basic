<!doctype html>
<html>
<head>
    <title>student id card</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#fafafa;
        }

        .card{
            width:650px;
            margin:30px auto;
            border:2px solid #c94c4c;
            border-radius:12px;
            background-color:white;
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.15);
        }

        .header{
            background-color:#b22222;
            color:white;
            text-align:center;
            padding:12px;
        }

        .header h2,
        .header h3{
            margin:4px;
        }

        .content{
            display:flex;
            align-items:flex-start;
            padding:20px;
            gap:25px;
        }

        img{
            width:120px;
            height:150px;
            object-fit:cover;
            border:2px solid #c94c4c;
            border-radius:5px;
        }

        .details{
            text-align:left;
        }

        .details h3{
            margin:10px 0;
            font-size:16px;
            font-weight:normal;
            color:#333;
        }

        .footer{
            background-color:#fff5f5;
            color:#b22222;
            text-align:center;
            padding:10px;
            font-weight:bold;
            border-top:1px solid #f0d6d6;
        }
    </style>

</head>
<body>

<div class="card">

    <div class="header">
        <h2>sanjay ghodawat institute</h2>
        <h3>student identity card</h3>
    </div>

    <div class="content">

        <img src="fox.jpg" alt="student photo">

        <div class="details">
            <h3><b>name :</b> khanak panchamiya</h3>
            <h3><b>roll no :</b> 23</h3>
            <h3><b>course :</b> computer science engineering</h3>
            <h3><b>college :</b> sanjay ghodawat institute</h3>
            <h3><b>contact no :</b> 9876543210</h3>
        </div>

    </div>

    <div class="footer">
        id card is mandatory in the college campus
    </div>

</div>

</body>
</html>
