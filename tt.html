<!doctype html>
<html>
<head>
    <title>school timetable</title>
</head>
<body>

<h2>school timetable</h2>

<table border="1" cellpadding="8">

    <tr>
        <th>time</th>
        <th>monday</th>
        <th>tuesday</th>
        <th>wednesday</th>
        <th>thursday</th>
        <th>friday</th>
    </tr>

    <tr>
        <td>9:00-10:00</td>
        <td>science</td>
        <td>english</td>
        <td>maths</td>
        <td>science</td>
        <td>english</td>
    </tr>

    <tr>
        <td>10:00-11:00</td>
        <td>english</td>
        <td>maths</td>
        <td>history</td>
        <td>maths</td>
        <td>history</td>
    </tr>

    <tr>
        <td>11:00-12:00</td>
        <td colspan="5"><center>break</center></td>
    </tr>

    <tr>
        <td>12:00-1:00</td>
        <td>history</td>
        <td>history</td>
        <td>science</td>
        <td>english</td>
        <td>sports</td>
    </tr>

    <tr>
        <td>1:00-2:00</td>
        <td>maths</td>
        <td>science</td>
        <td>english</td>
        <td>history</td>
        <td>science</td>
    </tr>

</table>

</body>
</html>
