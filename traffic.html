<!doctype html>
<html>
<body>

<script>

let color = prompt("enter signal color (red, yellow, green)");

switch(color)
{
    case "red":
        document.write("stop");
        break;

    case "yellow":
        document.write("wait");
        break;

    case "green":
        document.write("go");
        break;

    default:
        document.write("invalid color");
}

</script>

</body>
</html>
