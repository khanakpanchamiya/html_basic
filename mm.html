<!doctype html>
<html>
<head>
    <title>media tags</title>
</head>
<body>
    <h1>create a web page using image, audio, video, and iframe tags</h1>
<table>
    <tr>
        <th>image</th>
        <th>audio</th>
    </tr>
    <tr>
        <td>
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSBgKOB1veDn0vyUhM8jBPotuHFpwL2xhY6m5cCJOmQZ_YP--6L-5f7CBHc&s=10" alt="sample image" width="150" height="100">
        </td>
        <td>
            <audio controls>
                <source src="Justin_Biber-_company_-_Company_(mp3.pm).mp3" type="audio/mpeg">
            </audio>
        </td>
    </tr>
</table>

<hr>

<h2>video</h2>

<video width="380" height="230" controls>
    <source src="WhatsApp Video 2026-06-08 at 10.46.44 PM.mp4" type="video/mp4">
</video>

<hr>

<h2>youtube video (iframe)</h2>

  <iframe
        width="400"
        height="250"
        src="https://www.youtube.com/embed/1NxWHIrugho?si=f5gDxwnr2llXfURc">
    </iframe>

</body>
</html>
