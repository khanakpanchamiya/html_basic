<!doctype html>
<html>
<head>

    <title>redbus booking</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:arial;
        }

        body{
            background:#f5f5f5;
        }

        /* navbar */

        nav{
            background:#ff000d;
            color:white;
            padding:18px 60px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav h2{
            font-size:28px;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:25px;
        }

        nav ul li{
            cursor:pointer;
        }

        nav ul li:hover{
            text-decoration:underline;
        }

        /* hero */

        .hero{
            background:#ff000d;
            padding:50px;
            text-align:center;
            color:white;
        }

        .hero h1{
            margin-bottom:30px;
        }

        .search-box{
            background:white;
            padding:20px;
            border-radius:12px;
            display:flex;
            justify-content:center;
            gap:15px;
            width:85%;
            margin:auto;
        }

        .search-box input{
            padding:12px;
            width:220px;
            border:1px solid lightgray;
            border-radius:6px;
        }

        .search-box button{
            background:#ff000d;
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:6px;
            cursor:pointer;
            font-size:15px;
        }

        .search-box button:hover{
            background:#ff000d;
        }

        /* cards */

        .container{
            width:90%;
            margin:40px auto;
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:25px;
        }

        .card{
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0px 4px 10px rgba(0,0,0,0.2);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-6px);
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .details{
            padding:18px;
        }

        .details h3{
            color:#ff000d;
            margin-bottom:10px;
        }

        .details p{
            margin:6px 0;
        }

        .price{
            font-size:20px;
            font-weight:bold;
            color:green;
        }

        .details button{
            width:100%;
            margin-top:15px;
            padding:12px;
            background:#ff000d;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }

        .details button:hover{
            background:#ff000d;
        }

        #message{
            text-align:center;
            color:green;
            font-size:22px;
            margin-top:25px;
            font-weight:bold;
        }

        footer{
            background:#222;
            color:white;
            text-align:center;
            padding:20px;
            margin-top:40px;
        }

        @media(max-width:900px){

            .container{
                grid-template-columns:1fr;
            }

            .search-box{
                flex-direction:column;
                align-items:center;
            }

            .search-box input{
                width:100%;
            }

        }

    </style>

</head>

<body>

<nav>

    <h2>redbus</h2>

    <ul>

        <li>home</li>
        <li>bus tickets</li>
        <li>offers</li>
        <li>contact</li>

    </ul>

</nav>

<div class="hero">

    <h1>book bus tickets online</h1>

    <div class="search-box">

        <input type="text" placeholder="from">

        <input type="text" placeholder="to">

        <input type="date">

        <button onclick="searchBus()">
            search buses
        </button>

    </div>

</div>

<div id="message"></div>

<div class="container" id="buslist"></div>

<footer>

    © 2025 redbus clone | all rights reserved

</footer>

<script>

let buses=[

{
name:"volvo ac sleeper",
route:"delhi ➜ jaipur",
price:"₹899",
image:"https://buscdn.cardekho.com/in/volvo/9600/volvo-9600.jpg"
},

{
name:"scania luxury",
route:"mumbai ➜ goa",
price:"₹1299",
image:"https://buscdn.cardekho.com/in/scania/k480-eb/scania-k480-eb.jpg?impolicy=resize&imwidth=480"
},

{
name:"bharat benz",
route:"bangalore ➜ hyderabad",
price:"₹999",
image:"https://buscdn.cardekho.com/in/bharatbenz/1017-staff-bus/bharatbenz-1017-staff-bus-73701.jpg?impolicy=resize&imwidth=480"
}

];

let output="";

buses.forEach(function(bus){

output+=`

<div class="card">

<img src="${bus.image}">

<div class="details">

<h3>${bus.name}</h3>

<p>${bus.route}</p>

<p class="price">${bus.price}</p>

<p>⭐ 4.8 | available seats</p>

<button onclick="book('${bus.name}')">

book now

</button>

</div>

</div>

`;

});

document.getElementById("buslist").innerHTML=output;

function searchBus(){

document.getElementById("message").innerHTML="available buses";

}

function book(name){

document.getElementById("message").innerHTML="✅ booking confirmed for <b>"+name+"</b>";

window.scrollTo({

top:0,

behavior:"smooth"

});

}

</script>

</body>
</html>
