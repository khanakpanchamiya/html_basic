<!doctype html>
<html>
<head>
    <title>functions example</title>
</head>
<body>

    <script>

        // user-defined function
        function greet()
        {
            document.write("hello<br>");
        }

        greet();

        // function with parameters
        function add(a,b)
        {
            document.write("sum = " + (a+b) + "<br>");
        }

        add(10,20);

        // function with return value
        function multiply(a,b)
        {
            return a*b;
        }

        document.write("product = " + multiply(5,4));

    </script>

</body>
</html>
