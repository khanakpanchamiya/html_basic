<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>attributes example</title>
</head>
<body>

    <h1 id="heading" class="title" style="color: rgb(255, 0, 0);">
        html
    </h1>

    <p title="this is a paragraph" style="color: rgb(0, 126, 245);" align="left">
        this paragraph uses multiple attributes
    </p>

    <a href="https://www.amazon.com" target="_blank" title="visit amazon">
        open amazon
    </a>

    <br><br>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuDB7us5dsk_7Gm3NDQc4lKvD53MrmE8eqVQ&s/200"
         alt="sample image"
         width="200"
         height="150"
         title="placeholder image">

    <br><br>

    <input type="text"
           placeholder="web name"
           maxlength="20"
           required>

</body>
</html>
