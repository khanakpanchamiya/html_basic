<!DOCTYPE html>
<html>
<head>
    <title>Switch Statement Example</title>
</head>
<body>

    <h2>JavaScript Switch Statement</h2>

    <script>
        let num = prompt("Enter a number (1 or 2):");

        switch (num) {
            case "1":
                document.write("You entered One");
                break;

            case "2":
                document.write("You entered Two");
                break;

            default:
                document.write("Invalid Number");
        }
    </script>

</body>
</html>
